# Lefthook Configuration
# Refer to https://github.com/evilmartians/lefthook for more details

pre-commit:
  parallel: false # 关闭并行，保持流程清晰
  commands:
    "前端_Biome代码自动格式化":
      run: pnpm check:apply
      stage_fixed: true
    "后端_Rust代码格式化检查":
      run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

pre-push:
  parallel: false
  commands:
    "前端_Biome代码规范检查":
      run: pnpm check
    "前端_TypeScript类型检查":
      run: pnpm typecheck
    "前端_错误处理规范检查":
      run: pnpm check:error-handling
    "前端_接口设计参数检查":
      run: pnpm check:application-params
    "前端_单元测试与覆盖率":
      run: pnpm test:coverage
    "后端_Rust静态代码检查(Clippy)":
      run: cargo clippy --manifest-path src-tauri/Cargo.toml -p animesh_core -- -D warnings
    "后端_Rust单元测试与覆盖率":
      run: pnpm test:rust:coverage
