services:
  animesh:
    build:
      context: .
      dockerfile: Dockerfile
    image: animesh:latest
    container_name: animesh
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "3000:3000"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - ./data:/app/data
    environment:
      - RUST_LOG=info
      - ANIMESH_SERVER_PORT=8080
      - ANIMESH_STREAM_PORT=3000
      - ANIMESH_EXTERNAL_URL=http://localhost:3000
